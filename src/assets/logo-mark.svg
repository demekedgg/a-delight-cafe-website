<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 260" fill="none">
  <!-- Coffee bean oval -->
  <ellipse cx="100" cy="130" rx="78" ry="105" fill="#2a1a10" stroke="#c9a24a" stroke-width="3"/>
  <!-- Inner subtle ring -->
  <ellipse cx="100" cy="130" rx="72" ry="99" fill="none" stroke="#c9a24a" stroke-width="0.6" opacity="0.5"/>
  <!-- Gold S-curve center vein -->
  <path d="M100 30
           C 70 70, 130 110, 100 150
           C 70 190, 130 220, 100 230"
        stroke="#d9b25a" stroke-width="9" stroke-linecap="round" fill="none"/>
  <!-- Left Ethiopian diamond motif -->
  <g stroke="#d9b25a" stroke-width="2" fill="none" stroke-linejoin="round">
    <path d="M55 130 L75 110 L95 130 L75 150 Z"/>
    <path d="M62 130 L75 117 L88 130 L75 143 Z"/>
    <rect x="71" y="126" width="8" height="8" transform="rotate(45 75 130)"/>
    <!-- dots above/below -->
    <circle cx="75" cy="95" r="1.6" fill="#d9b25a"/>
    <circle cx="75" cy="100" r="1.6" fill="#d9b25a"/>
    <circle cx="75" cy="160" r="1.6" fill="#d9b25a"/>
    <circle cx="75" cy="165" r="1.6" fill="#d9b25a"/>
    <circle cx="75" cy="170" r="1.6" fill="#d9b25a"/>
  </g>
  <!-- Right Ethiopian diamond motif (smaller) -->
  <g stroke="#d9b25a" stroke-width="2" fill="none" stroke-linejoin="round">
    <path d="M110 130 L125 115 L140 130 L125 145 Z"/>
    <path d="M117 130 L125 122 L133 130 L125 138 Z"/>
    <circle cx="125" cy="103" r="1.4" fill="#d9b25a"/>
    <circle cx="125" cy="155" r="1.4" fill="#d9b25a"/>
    <circle cx="125" cy="160" r="1.4" fill="#d9b25a"/>
  </g>
</svg>
